name: Xenovia Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install core dependencies (skip platform-specific ones)
        pip install google-genai httpx beautifulsoup4 fastapi uvicorn websockets python-multipart duckduckgo-search
        pip install chromadb sentence-transformers pinecone
        pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client
        pip install mcp discord.py line-bot-sdk
        pip install scholarly biopython
        pip install python-dotenv pydantic pypdf "numpy<2.0.0" aiohttp docker click rich python-multipart
        pip install pytest pytest-asyncio

    - name: Create minimal .env for tests
      run: |
        echo "GEMINI_API_KEY=test_key_for_ci" > .env
        echo "GEMINI_MODEL=gemini-2.0-flash" >> .env

    - name: Run tests
      run: |
        python -m pytest tests/ -v --tb=short -x \
          --ignore=tests/test_api_connectivity.py \
          -k "not test_gemini_connectivity and not test_pinecone_connectivity and not test_google_services"
      env:
        PYTHONPATH: .
        CI: true
